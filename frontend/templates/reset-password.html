<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set new password – GetURLMonitor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>.gradient-bg { background: linear-gradient(135deg, #0f2340 0%, #1a3a6b 100%); }</style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center px-4">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <a href="/"><img src="/static/logo.png" alt="GetURLMonitor" class="h-20 w-auto mx-auto rounded-lg"></a>
      <p class="text-gray-700 font-semibold mt-4">Set a new password</p>
    </div>
    <div id="form-section" class="space-y-4">
      <input id="password" type="password" placeholder="New password (min. 8 characters)" class="w-full border rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
      <input id="confirm" type="password" placeholder="Confirm password" class="w-full border rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
        onkeydown="if(event.key==='Enter') submit()">
      <button onclick="submit()" class="w-full bg-blue-500 hover:bg-blue-400 text-white font-bold py-3 rounded-xl transition">Update password</button>
    </div>
    <div id="success" class="hidden text-center py-4">
      <div class="text-4xl mb-3">✅</div>
      <p class="text-gray-700 font-semibold">Password updated</p>
      <a href="/login" class="mt-4 inline-block text-blue-500 hover:underline text-sm">Go to login →</a>
    </div>
    <p id="error" class="text-red-500 text-sm text-center mt-3 hidden"></p>
  </div>
  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) window.location.href = '/login';

    async function submit() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const err = document.getElementById('error');
      if (password.length < 8) { err.textContent = 'Password must be at least 8 characters.'; err.classList.remove('hidden'); return; }
      if (password !== confirm) { err.textContent = 'Passwords do not match.'; err.classList.remove('hidden'); return; }
      err.classList.add('hidden');
      const resp = await fetch('/auth/reset-password', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password }),
      });
      if (resp.ok) {
        document.getElementById('form-section').classList.add('hidden');
        document.getElementById('success').classList.remove('hidden');
      } else {
        const data = await resp.json();
        err.textContent = data.detail || 'Invalid or expired link. Request a new one.';
        err.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
