<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot password – GetURLMonitor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>.gradient-bg { background: linear-gradient(135deg, #0f2340 0%, #1a3a6b 100%); }</style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center px-4">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <a href="/"><img src="/static/logo.jpg" alt="GetURLMonitor" class="h-20 w-auto mx-auto rounded-lg"></a>
      <p class="text-gray-700 font-semibold mt-4">Reset your password</p>
      <p class="text-gray-500 text-sm mt-1">Enter your email and we'll send you a reset link.</p>
    </div>
    <div id="form-section" class="space-y-4">
      <input id="email" type="email" placeholder="your@email.com" class="w-full border rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
      <button onclick="submit()" class="w-full bg-blue-500 hover:bg-blue-400 text-white font-bold py-3 rounded-xl transition">Send reset link</button>
    </div>
    <div id="success" class="hidden text-center py-4">
      <div class="text-4xl mb-3">✉️</div>
      <p class="text-gray-700 font-semibold">Check your inbox</p>
      <p class="text-gray-500 text-sm mt-1">If that email is registered, you'll receive a reset link shortly.</p>
    </div>
    <p id="error" class="text-red-500 text-sm text-center mt-3 hidden"></p>
    <p class="text-center text-gray-500 text-sm mt-6"><a href="/login" class="text-blue-500 hover:underline">← Back to login</a></p>
  </div>
  <script>
    async function submit() {
      const email = document.getElementById('email').value.trim();
      if (!email) return;
      await fetch('/auth/forgot-password', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      document.getElementById('form-section').classList.add('hidden');
      document.getElementById('success').classList.remove('hidden');
    }
  </script>
</body>
</html>
